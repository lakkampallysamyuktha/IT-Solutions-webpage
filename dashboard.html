<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<nav class="navbar">
  <h2>Stackly Dashboard</h2>
  <button onclick="logout()" class="login-btn">Logout</button>
</nav>

<section style="padding:100px 50px">

<h2 id="welcome"></h2>

<div class="services">

  <div class="card">
    <h3>Users</h3>
    <p>120</p>
  </div>

  <div class="card">
    <h3>Projects</h3>
    <p>45</p>
  </div>

  <div class="card">
    <h3>Services</h3>
    <p>10</p>
  </div>

  <div class="card">
    <h3>Reports</h3>
    <p>22</p>
  </div>

</div>

<br><br>

<canvas id="myChart" width="400" height="150"></canvas>

</section>

<script>
// Check login
if(localStorage.getItem("loggedIn") !== "true"){
  window.location.href = "login.html";
}

// Show user name
const user = JSON.parse(localStorage.getItem("user"));
document.getElementById("welcome").innerText = "Welcome " + user.name + " (" + user.role + ")";

// Logout
function logout(){
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

// Chart
const ctx = document.getElementById('myChart');

new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['Jan','Feb','Mar','Apr','May','Jun'],
    datasets: [{
      label: 'Growth',
      data: [10,20,15,30,25,40],
      borderColor: '#38bdf8',
      fill: false
    }]
  }
});
</script>

</body>
</html>
